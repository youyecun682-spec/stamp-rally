<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👽スタンプラリーPRO</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
  margin:0;
  background:linear-gradient(to bottom,#050816,#0b1f4d,#1b3b73);
}

/* タイトル */
h1{
  font-size:55px;
  color:white;
  text-shadow:
    0 0 10px #00ccff,
    0 0 30px #00ccff,
    0 0 50px #0088ff;
}

/* メッセージ */
#msg{
  color:white;
  margin-bottom:20px;
}

/* QR */
#reader{
  width:300px;
  margin:auto;
}

/* 入力 */
input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* ボタン */
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:white;
  cursor:pointer;
  font-size:15px;
}

/* 難易度ボックス */
.level-box{
  background:rgba(255,255,255,0.12);
  border:2px solid #00ccff;
  border-radius:25px;
  padding:25px;
  margin:35px 0;
  box-shadow:0 0 20px rgba(0,204,255,0.5);
}

/* 難易度タイトル */
.level-title{
  font-size:35px;
  color:white;
  margin-bottom:25px;
  text-shadow:0 0 10px #00ccff;
}

/* 横並び */
.game-row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

/* ゲーム */
.game{
  width:130px;
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 10px rgba(0,204,255,0.4);
}

/* ゲーム名 */
.game-name{
  color:white;
  font-size:16px;
  min-height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:bold;
}

/* スタンプ */
.stamp{
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  background:white;
  font-size:40px;
}

/* 完了 */
.done{
  background:#00ccff;
  color:white;
  box-shadow:
    0 0 10px #00ccff,
    0 0 20px #00ccff,
    0 0 40px #00ccff;
  animation:glow 1s infinite alternate;
}

/* 光る */
@keyframes glow{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.15);
  }
}

/* COMPLETE演出 */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

/* COMPLETE文字 */
#overlayText{
  color:#00ccff;
  font-size:70px;
  text-shadow:
    0 0 20px #00ccff,
    0 0 40px #0088ff;
  animation:pop 1s infinite alternate;
}

#overlaySub{
  color:white;
  font-size:25px;
  margin-top:15px;
}

@keyframes pop{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.2);
  }
}

</style>
</head>

<body>

<h1>👽スタンプをあつめよう</h1>

<h3 id="msg">
QRを読み取ってください
</h3>

<!-- QR -->
<div id="reader"></div>

<br>

<input id="qrInput" type="number" placeholder="QR番号">

<br>

<button onclick="scanQR()">
QR読み取り
</button>

<button onclick="startQR()">
QRカメラ開始
</button>

<!-- COMPLETE -->
<div id="overlay">

<div id="overlayText">
COMPLETE🚀
</div>

<div id="overlaySub">
全ゲームクリア！
</div>

</div>

<!-- 初級 -->

</div>

</div>
</div>

<!-- 中級 -->
<div class="level-box">

<div class="level-title">
中級
</div>

<div class="game-row">

<div class="game">
<div class="game-name">ジャストチャレンジ</div>
<div id="s7" class="stamp">○</div>
</div>

<div class="game">
<div class="game-name">AIと人間</div>
<div id="s8" class="stamp">○</div>
</div>

<div class="game">
<div class="game-name">タブトス</div>
<div id="s9" class="stamp">○</div>
</div>

<div class="game">
<div class="game-name">モルック</div>
<div id="s10" class="stamp">○</div>

<div class="game">

<!-- QRライブラリ -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scanned = new Set();

/* スタンプ取得 */
function getStamp(num){

  num = parseInt(num);

  if(scanned.has(num)) return;

  scanned.add(num);

  const target = document.getElementById("s"+num);

  if(target){

    target.classList.add("done");

    target.innerHTML = "👽";

    document.getElementById("msg").innerHTML =
      "👽 スタンプGET！ → " + num;

    checkComplete();

  }

}

/* QR手入力 */
function scanQR(){

  let num = document.getElementById("qrInput").value;

  if(num){
    getStamp(num);
  }

}

/* QRカメラ */
function startQR(){

  const qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    qr.start(
      devices[0].id,
      { fps:10, qrbox:250 },

      (decodedText) => {

        getStamp(decodedText);

      }

    );

  });

}

/* COMPLETE判定 */
function checkComplete(){

  if(allDone(1,6)){
    showComplete("初級 COMPLETE!");
  }

  if(allDone(7,12)){
    showComplete("中級 COMPLETE!");
  }

  if(allDone(13,18)){
    showComplete("上級 COMPLETE!");
  }

}

/* 範囲判定 */
function allDone(start,end){

  for(let i=start;i<=end;i++){

    const el = document.getElementById("s"+i);

    if(!el.classList.contains("done")){
      return false;
    }

  }

  return true;

}

/* 演出 */
function showComplete(text){

  document.getElementById("overlay").style.display = "flex";

  document.getElementById("overlayText").innerHTML = text;

  setTimeout(()=>{

    document.getElementById("overlay").style.display = "none";

  },3000);

}

</script>

</html>
