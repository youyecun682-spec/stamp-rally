<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👽スタンプラリーPRO</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  padding:20px;
  background:linear-gradient(to bottom,#050816,#0b1f4d,#1b3b73);
  color:white;
}

h1{
  font-size:45px;
  text-shadow:0 0 10px #00ccff;
}

/* ゲーム全体 */
.level-box{
  margin:25px 0;
  padding:20px;
  border:2px solid #00ccff;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
}

.level-title{
  font-size:28px;
  margin-bottom:15px;
}

/* 横並び */
.game-row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.game{
  width:120px;
  padding:10px;
  background:rgba(255,255,255,0.12);
  border-radius:15px;
}

.game-name{
  font-size:14px;
  min-height:40px;
}

.stamp{
  width:60px;
  height:60px;
  margin:auto;
  border-radius:50%;
  background:white;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.done{
  background:#00ccff;
  color:white;
  box-shadow:0 0 10px #00ccff;
}

/* QR */
video{
  width:300px;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:white;
}

#msg{
  margin:10px;
}

</style>
</head>

<body>

<h1>👽スタンプラリー</h1>

<div id="msg">QRを読み取ってください</div>

<!-- QR -->
<button onclick="startCamera()">QRカメラ開始</button>
<button onclick="stopCamera()">停止</button>

<br>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- 初級 -->
<div class="level-box">
<div class="level-title">初級</div>

<div class="game-row">
<div class="game"><div class="game-name">ジャストチャレンジ</div><div id="s1" class="stamp">○</div></div>
<div class="game"><div class="game-name">AIと人間</div><div id="s2" class="stamp">○</div></div>
<div class="game"><div class="game-name">タブトス</div><div id="s3" class="stamp">○</div></div>
<div class="game"><div class="game-name">モルック</div><div id="s4" class="stamp">○</div></div>
<div class="game"><div class="game-name">ペットボトル崩し</div><div id="s5" class="stamp">○</div></div>
<div class="game"><div class="game-name">絵本</div><div id="s6" class="stamp">○</div></div>
</div>
</div>

<!-- 中級 -->
<div class="level-box">
<div class="level-title">中級</div>

<div class="game-row">
<div class="game"><div class="game-name">ジャストチャレンジ</div><div id="s7" class="stamp">○</div></div>
<div class="game"><div class="game-name">AIと人間</div><div id="s8" class="stamp">○</div></div>
<div class="game"><div class="game-name">タブトス</div><div id="s9" class="stamp">○</div></div>
<div class="game"><div class="game-name">モルック</div><div id="s10" class="stamp">○</div></div>
<div class="game"><div class="game-name">ペットボトル崩し</div><div id="s11" class="stamp">○</div></div>
<div class="game"><div class="game-name">絵本</div><div id="s12" class="stamp">○</div></div>
</div>
</div>

<!-- 上級 -->
<div class="level-box">
<div class="level-title">上級</div>

<div class="game-row">
<div class="game"><div class="game-name">ジャストチャレンジ</div><div id="s13" class="stamp">○</div></div>
<div class="game"><div class="game-name">AIと人間</div><div id="s14" class="stamp">○</div></div>
<div class="game"><div class="game-name">タブトス</div><div id="s15" class="stamp">○</div></div>
<div class="game"><div class="game-name">モルック</div><div id="s16" class="stamp">○</div></div>
<div class="game"><div class="game-name">ペットボトル崩し</div><div id="s17" class="stamp">○</div></div>
<div class="game"><div class="game-name">絵本</div><div id="s18" class="stamp">○</div></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let stream;
let scanning = false;

let scanned = new Set();

/* スタンプ処理 */
function getStamp(num){

  num = parseInt(num);

  if(scanned.has(num)) return;

  scanned.add(num);

  let el = document.getElementById("s"+num);

  if(el){
    el.classList.add("done");
    el.innerHTML = "👽";
  }

  document.getElementById("msg").innerText = "GET! → " + num;
}

/* カメラ開始 */
async function startCamera(){

  try{

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    scanning = true;

    scanLoop();

  }catch(err){
    alert("カメラ起動失敗: " + err);
  }
}

/* 停止 */
function stopCamera(){

  scanning = false;

  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }
}

/* QR読み取りループ */
function scanLoop(){

  if(!scanning) return;

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    let img = ctx.getImageData(0,0,canvas.width,canvas.height);

    let code = jsQR(img.data, canvas.width, canvas.height);

    if(code){
      getStamp(code.data);
    }
  }

  requestAnimationFrame(scanLoop);
}

</script>

</body>
</html>
