<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>👽スタンプラリーPRO</title>

<style>

body{
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  background:linear-gradient(to bottom,#050816,#0b1f4d,#1b3b73);
}

h1{
  font-size:55px;
  color:white;
  text-shadow:0 0 10px #00ccff,0 0 30px #00ccff;
}

#reader{
  margin:auto;
}

.level-box{
  background:rgba(255,255,255,0.12);
  border:2px solid #00ccff;
  border-radius:25px;
  padding:25px;
  margin:30px 0;
}

.level-title{
  font-size:32px;
  color:white;
  margin-bottom:20px;
}

.game-row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.game{
  width:120px;
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:10px;
}

.game-name{
  color:white;
  font-size:16px;
  min-height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.stamp{
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  background:white;
  font-size:35px;
}

.done{
  background:#00ccff;
  color:white;
  box-shadow:0 0 10px #00ccff;
  animation: glow 1s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:white;
  cursor:pointer;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  color:#00ccff;
  font-size:60px;
  z-index:999;
  text-shadow:0 0 20px #00ccff;
  animation: popup 0.5s;
}

@keyframes popup{
  from{
    transform:scale(0.5);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

</style>
</head>

<body>

<script>

let scanned = new Set();

let beginnerComplete = false;
let middleComplete = false;
let advancedComplete = false;

/* スタンプ取得 */
function getStamp(num){

  num = parseInt(num);

  if(scanned.has(num)) return;

  scanned.add(num);

  const target = document.getElementById("s"+num);

  if(target){

    target.classList.add("done");

    target.innerHTML = "👽";

    document.getElementById("msg").innerHTML =
      "👽 スタンプGET！ → " + num;

    saveStamp(num);

    checkComplete();

  }

}

/* Firebase保存 */
async function saveStamp(num){

  await window.setDoc(
    window.doc(window.db,"stamps","user1"),
    {
      ["s"+num]: true
    },
    { merge:true }
  );

}

/* QR手入力 */
function scanQR(){

  let num = document.getElementById("qrInput").value;

  if(num){
    getStamp(num);
  }

}

/* QRカメラ */
function startQR(){

  const qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    qr.start(
      devices[0].id,
      { fps:10, qrbox:250 },

      (decodedText) => {

        getStamp(decodedText);

      }

    );

  });

}

/* COMPLETE判定 */
function checkComplete(){

  // 初級
  if(isDone(1,6) && !beginnerComplete){

    beginnerComplete = true;

    showComplete("🌟 初級 COMPLETE!");

  }

  // 中級
  if(isDone(7,12) && !middleComplete){

    middleComplete = true;

    showComplete("🚀 中級 COMPLETE!");

  }

  // 上級
  if(isDone(13,18) && !advancedComplete){

    advancedComplete = true;

    showComplete("👽 上級 COMPLETE!");

  }

}

/* 範囲チェック */
function isDone(start,end){

  for(let i=start;i<=end;i++){

    if(!scanned.has(i)){
      return false;
    }

  }

  return true;

}

/* COMPLETE表示 */
function showComplete(text){

  const overlay =
    document.getElementById("overlay");

  overlay.innerHTML = text;

  overlay.style.display = "flex";

  setTimeout(()=>{

    overlay.style.display = "none";

  },3000);

}

</script>
