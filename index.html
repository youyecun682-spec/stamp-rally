<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👽スタンプラリーQR安定版</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:linear-gradient(to bottom,#050816,#0b1f4d,#1b3b73);
  color:white;
  padding:20px;
}

h1{
  font-size:40px;
}

video{
  width:300px;
  border-radius:10px;
  margin-top:10px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:white;
  font-weight:bold;
}

#msg{
  margin-top:10px;
  font-size:18px;
}

.stamp{
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>👽QRスタンプ</h1>

<button onclick="startCamera()">QRカメラ開始</button>
<button onclick="stopCamera()">停止</button>

<br>

<video id="video" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<div id="msg">QRをかざしてください</div>

<div class="stamp" id="stampLog"></div>

<!-- jsQR -->
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let stream;
let scanning = false;

let scanned = new Set();

/* カメラ起動 */
async function startCamera(){

  try{

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    scanning = true;

    scanLoop();

    document.getElementById("msg").innerText = "QRを読み取り中...";

  }catch(err){
    alert("カメラ起動失敗：" + err);
  }
}

/* 停止 */
function stopCamera(){

  scanning = false;

  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }

  document.getElementById("msg").innerText = "停止しました";
}

/* QR読み取りループ */
function scanLoop(){

  if(!scanning) return;

  if(video.readyState === video.HAVE_ENOUGH_DATA){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

    let code = jsQR(imageData.data, canvas.width, canvas.height);

    if(code){

      let num = parseInt(code.data);

      if(!scanned.has(num)){

        scanned.add(num);

        document.getElementById("msg").innerText = "GET: " + num;

        document.getElementById("stampLog").innerText += "👽 " + num + " ";

      }
    }
  }

  requestAnimationFrame(scanLoop);
}

</script>

</body>
</html>
